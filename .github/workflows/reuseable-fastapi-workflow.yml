name: Reusable FastAPI CICD Workflow
on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: true
        default: '3.11'
        
      environment_name:
        description: 'Environment to deploy to'
        required: true
        type: string

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    timeout-minutes: 45

    env:
      PYTHON_VERSION: ${{ inputs.python-version }}
      REPO_NAME: ${{ github.event.repository.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m venv myvenv
          source myvenv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check App Import
        run: |
          source myvenv/bin/activate
          python -c "from app.main import app"
      
      - name: Lint code with flake8
        run: |
          source myvenv/bin/activate
          pip install flake8
          flake8 app

      - name: Run tests with pytest
        run: |
          source myvenv/bin/activate
          pip install pytest
          pytest tests

      - name: Debug Secrets presenece
        run: |
          echo "Checking for secrets presence"
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "SSH_PRIVATE_KEY is not set"
            exit 1
          else
            echo "From Environment Secrets SSH_PRIVATE_KEY is SET which is ${{ secrets.SSH_PRIVATE_KEY }}"
          fi

          if [ -z "${{ secrets.SERVER_USERNAME }}" ]; then
            echo "SERVER_USERNAME is EMPTY"
            exit 1
          else
            echo "From Environment Secrets SERVER_USERNAME is SET which is ${{ secrets.SERVER_USERNAME }}"
          fi

          if [ -z "${{ vars.PORT }}" ]; then
            echo "Secrets PORT is EMPTY"
          else
            echo "From Environment vars PORT is SET which is ${{ vars.PORT }}"
          fi

          if [ -z "${{ vars.ENVIRONMENT }}" ]; then
            echo "ENVIRONMENT is EMPTY"
          else
            echo "From Environment vars ENVIRONMENT is SET which is ${{ vars.ENVIRONMENT }}"
          fi      


      - name: Create Clean Deployment copy
        run: |
          mkdir -p /tmp/deploy
          rsync -av --exclude='myvenv' \
          --exclude='.git' \
          --exclude='tests' \
          --exclude='.github' \
          --exclude='*.log' \
          --exclude='__pycache__' \
          --exclude='.pytest_cache' \
          --exclude='*.pyc' \
          ./ /tmp/deploy/

      - name: Set up SSH for Deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || {
            echo "Warining could not add server to known_hosts"
            echo "Will rely on StrictHostKeyChecking=no for this deployment"
          }

      - name: Test SSH Connection
        run: |
          ssh -i ~/.ssh/deploy_key \
          -o StrictHostKeyChecking=no \
          -o ConnectTimeout=10 \
          -o UserKnownHostsFile=/dev/null \
          -o LogLevel=ERROR \
          ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} \
          "echo 'SSH connection successful!'"

      - name: Prepare Deployment directory on Server
        run: |
          ssh -i ~/.ssh/deploy_key \
          -o StrictHostKeyChecking=no \
          -o ConnectTimeout=10 \
          -o UserKnownHostsFile=/dev/null \
          -o LogLevel=ERROR \
          ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} \
          "mkdir -p '/home/${{ secrets.SERVER_USERNAME }}/${{ env.REPO_NAME }}'"

      - name: Deploy files to server via rsync
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR" \
          --exclude='myvenv' \
          --exclude='.git' \
          --exclude='tests' \
          --exclude='.github' \
          --exclude='*.log' \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          /tmp/deploy/ \
          ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USERNAME }}/${{ env.REPO_NAME }}/

      - name: Install Production and run application on server
        run: |
          ssh -i ~/.ssh/deploy_key \
          -o StrictHostKeyChecking=no \
          -o ConnectTimeout=10 \
          -o UserKnownHostsFile=/dev/null \
          -o LogLevel=ERROR \
          ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} \
          "set -e 
          cd '/home/${{ secrets.SERVER_USERNAME }}/${{ env.REPO_NAME }}' 
          # Create virtual environment
          python3 -m venv myvenv
          source myvenv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

          # Install PM2 globally if not already installed
          if ! command -v pm2 &> /dev/null; then
            npm install -g pm2
          fi

          # Restart or start the FastAPI application using PM2
          if pm2 list | grep -q $REPO_NAME; then
            pm2 reload $REPO_NAME --update-env
          else
            pm2 start python --name $REPO_NAME -- -m uvicorn app.main:app --host ${{ secrets.APP_HOST_IP }} --port ${{ vars.APP_PORT }}
          fi

          pm2 save
          pm2 list
          "

      - name: Clean up
        run: |
          rm -rf /tmp/deploy
          rm -rf ~/.ssh/deploy_key

  slack_notification:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: build-and-deploy
    environment: ${{ inputs.environment_name }}
    steps:
      - name: Slack Notification Status
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: deployments
          SLACK_COLOR: ${{ needs.build-and-deploy.result == 'success' && 'good' || needs.build-and-deploy.result == 'failure' && 'danger' || 'warning' }}
          SLACK_TITLE: ${{ github.event.repository.name }} in ${{ inputs.environment_name }} Deployment Status
          SLACK_MESSAGE: |
            Repository: ${{ github.event.repository.name }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Status: ${{ needs.build-and-deploy.result }}
            ${{ needs.build-and-deploy.result == 'success' && '✅ deployment successful!' || '❌ deployment failed!' }}
          SLACK_FOOTER: "GitHub Actions • ${{ github.workflow }}"
        continue-on-error: true

          


        